{% load static %}
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ratsi Melle{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'core/css/layout.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/components.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/status.css' %}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{% url 'analysis:index' %}">Ratsi Melle</a>
      <input class="nav-checkbox" type="checkbox" id="nav-toggle">
      <label class="nav-toggle" for="nav-toggle" aria-label="Navigation umschalten">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <nav class="topnav" aria-label="Hauptnavigation">
        <a class="{% if active_nav == 'analysis' %}active{% endif %}" href="{% url 'analysis:index' %}">Uebersicht</a>
        <a class="{% if active_nav == 'analysis_start' %}active{% endif %}" href="{% url 'analysis:analysis_start' %}">KI-Analyse</a>
        <a class="{% if active_nav == 'sessions' %}active{% endif %}" href="{% url 'analysis:session_list' %}">Sitzungen</a>
        <a class="{% if active_nav == 'jobs' %}active{% endif %}" href="{% url 'analysis:job_list' %}">Jobs</a>
      </nav>
    </div>
  </header>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
