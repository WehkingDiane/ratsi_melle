{% load static %}
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ratsi Melle{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/layout.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/navigation.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/components.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/status.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand-block">
        <a class="brand" href="{% url 'dashboard' %}">Ratsi Melle</a>
        <p>Lokale Arbeitsoberflaeche</p>
      </div>
      <input class="nav-checkbox" type="checkbox" id="nav-toggle">
      <label class="nav-toggle" for="nav-toggle" aria-label="Navigation umschalten">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <nav class="main-nav" aria-label="Hauptnavigation">
        <a class="{% if active_nav == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="{% if active_nav == 'analysis' %}active{% endif %}" href="{% url 'analysis:index' %}">Analyse</a>
        <a class="{% if active_nav == 'data' %}active{% endif %}" href="{% url 'data_tools:index' %}">Daten</a>
        <a class="{% if active_nav == 'publishing' %}active{% endif %}" href="{% url 'publishing:index' %}">Veroeffentlichung</a>
        <a class="{% if active_nav == 'search' %}active{% endif %}" href="{% url 'search:index' %}">Suche</a>
        <a class="{% if active_nav == 'settings' %}active{% endif %}" href="{% url 'settings_ui:index' %}">Einstellungen</a>
      </nav>
      <a class="job-indicator" id="job-indicator" href="{% url 'data_tools:index' %}" hidden>
        <span class="job-spinner" aria-hidden="true"></span>
        <span id="job-indicator-text">Service laeuft</span>
      </a>
    </div>
  </header>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="site-footer-inner">Lokale Entwicklungsoberflaeche</div>
  </footer>
  <script src="{% static 'core/js/service_status.js' %}"></script>
</body>
</html>
